// Evidence API messages for query/save/list/get.
syntax = "proto3";

package apiserver.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/aiopsre/rca-api/pkg/api/apiserver/v1;v1";

// Evidence represents a persisted query result bound to an incident.
message Evidence {
  // evidenceID is the business resource ID (e.g. evidence-xxxxxx).
  string evidenceID = 1;
  // incidentID is bound incident ID.
  string incidentID = 2;
  // jobID is optional AI job id if generated by AI flow.
  optional string jobID = 3;
  // type is evidence type: metrics|logs|traces|k8s|script.
  string type = 4;
  // datasourceID is optional for data-backed evidence.
  optional string datasourceID = 5;
  // queryText stores the raw query (PromQL/LogQL/DSL).
  string queryText = 6;
  // queryJSON stores structured query payload.
  optional string queryJSON = 7;
  // queryHash is normalized query hash for dedup/index.
  string queryHash = 8;
  // timeRangeStart is query window start.
  google.protobuf.Timestamp timeRangeStart = 9;
  // timeRangeEnd is query window end.
  google.protobuf.Timestamp timeRangeEnd = 10;
  // resultJSON stores inline result (can be truncated in P0).
  string resultJSON = 11;
  // resultSizeBytes is raw result size before truncation.
  int64 resultSizeBytes = 12;
  // isTruncated indicates resultJSON is truncated by guardrails.
  bool isTruncated = 13;
  // summary is human-readable 1-2 lines summary.
  optional string summary = 14;
  // createdAt is creation timestamp.
  google.protobuf.Timestamp createdAt = 15;
  // createdBy is actor identifier: system|user:{id}|ai:{job_id}.
  string createdBy = 16;
}

// QueryMetricsRequest queries metrics datasource without persistence.
message QueryMetricsRequest {
  string datasourceID = 1;
  string promql = 2;
  google.protobuf.Timestamp timeRangeStart = 3;
  google.protobuf.Timestamp timeRangeEnd = 4;
  // stepSeconds is Prometheus query_range step.
  optional int64 stepSeconds = 5;
}

// QueryMetricsResponse returns metrics query result.
message QueryMetricsResponse {
  string queryResultJSON = 1;
  int64 resultSizeBytes = 2;
  int64 rowCount = 3;
  bool isTruncated = 4;
}

// QueryLogsRequest queries log datasource without persistence.
message QueryLogsRequest {
  string datasourceID = 1;
  // queryText is LogQL/DSL query text.
  string queryText = 2;
  // queryJSON is optional structured query payload for logs.
  optional string queryJSON = 3;
  google.protobuf.Timestamp timeRangeStart = 4;
  google.protobuf.Timestamp timeRangeEnd = 5;
  optional int64 limit = 6;
}

// QueryLogsResponse returns logs query result.
message QueryLogsResponse {
  string queryResultJSON = 1;
  int64 resultSizeBytes = 2;
  int64 rowCount = 3;
  bool isTruncated = 4;
}

// SaveEvidenceRequest saves query result as incident evidence.
message SaveEvidenceRequest {
  // incidentID identifies incident in URI.
  // @gotags: uri:"incidentID"
  string incidentID = 1;

  // idempotencyKey supports idempotent save retries.
  optional string idempotencyKey = 2;
  optional string jobID = 3;
  string type = 4;
  optional string datasourceID = 5;
  string queryText = 6;
  optional string queryJSON = 7;
  google.protobuf.Timestamp timeRangeStart = 8;
  google.protobuf.Timestamp timeRangeEnd = 9;
  string resultJSON = 10;
  optional string summary = 11;
  optional string createdBy = 12;
}

// SaveEvidenceResponse returns saved evidence id.
message SaveEvidenceResponse {
  string evidenceID = 1;
}

// GetEvidenceRequest fetches one evidence.
message GetEvidenceRequest {
  // evidenceID identifies evidence in URI.
  // @gotags: uri:"evidenceID"
  string evidenceID = 1;
}

// GetEvidenceResponse returns one evidence.
message GetEvidenceResponse {
  Evidence evidence = 1;
}

// ListIncidentEvidenceRequest lists incident evidence with paging.
message ListIncidentEvidenceRequest {
  // incidentID identifies incident in URI.
  // @gotags: uri:"incidentID"
  string incidentID = 1;
  // offset for pagination.
  // @gotags: form:"offset"
  int64 offset = 2;
  // limit for pagination.
  // @gotags: form:"limit"
  int64 limit = 3;

  // optional type filter.
  optional string type = 4;
  // optional datasource filter.
  optional string datasourceID = 5;
}

// ListIncidentEvidenceResponse returns list by incident.
message ListIncidentEvidenceResponse {
  int64 totalCount = 1;
  repeated Evidence evidence = 2;
}
