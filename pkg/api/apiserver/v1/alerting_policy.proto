// AlertingPolicy API 定义：告警策略的请求和响应消息
syntax = "proto3";

package apiserver.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/aiopsre/rca-api/pkg/api/apiserver/v1;v1";

// AlertingPolicy 表示告警策略配置
// 支持版本管理和激活/回滚机制
message AlertingPolicy {
  // id 表示策略唯一标识（自增主键）
  int64 id = 1;

  // name 表示策略名称（唯一）
  string name = 2;
  // description 表示策略描述
  optional string description = 3;

  // lineageID 表示逻辑策略版本链归属 ID（用于关联同一策略的多个版本）
  string lineageID = 4;
  // version 表示版本号（自动递增）
  int32 version = 5;
  // configJSON 表示策略配置 JSON
  string configJSON = 6;

  // active 表示是否激活（同一时间只能有一个激活）
  bool active = 7;
  // activatedAt 表示激活时间
  optional google.protobuf.Timestamp activatedAt = 8;
  // activatedBy 表示激活人
  optional string activatedBy = 9;
  // previousVersion 表示前一个版本号（用于回滚）
  optional int32 previousVersion = 10;

  // createdBy 表示创建人
  string createdBy = 11;
  // updatedBy 表示更新人
  optional string updatedBy = 12;
  // createdAt 表示创建时间
  google.protobuf.Timestamp createdAt = 13;
  // updatedAt 表示更新时间
  google.protobuf.Timestamp updatedAt = 14;
}

// CreateAlertingPolicyRequest 表示创建告警策略请求
message CreateAlertingPolicyRequest {
  // name 表示策略名称（必填）
  string name = 1;
  // description 表示策略描述
  optional string description = 2;
  // configJSON 表示策略配置 JSON（必填）
  string configJSON = 3;
}

// CreateAlertingPolicyResponse 表示创建告警策略响应
message CreateAlertingPolicyResponse {
  // alertingPolicy 表示创建的告警策略信息
  AlertingPolicy alertingPolicy = 1;
}

// GetAlertingPolicyRequest 表示获取告警策略请求
message GetAlertingPolicyRequest {
  // id 表示要获取的告警策略 ID
  // @gotags: uri:"id"
  int64 id = 1;
}

// GetAlertingPolicyResponse 表示获取告警策略响应
message GetAlertingPolicyResponse {
  // alertingPolicy 表示返回的告警策略信息
  AlertingPolicy alertingPolicy = 1;
}

// ListAlertingPoliciesRequest 表示获取告警策略列表请求
message ListAlertingPoliciesRequest {
  // offset 表示偏移量
  // @gotags: form:"offset"
  int64 offset = 1;

  // limit 表示每页数量
  // @gotags: form:"limit"
  int64 limit = 2;

  // name 表示可选的名称过滤
  optional string name = 3;
  // active 表示可选的激活状态过滤
  optional bool active = 4;
}

// ListAlertingPoliciesResponse 表示获取告警策略列表响应
message ListAlertingPoliciesResponse {
  // totalCount 表示总数
  int64 totalCount = 1;
  // alertingPolicies 表示告警策略列表
  repeated AlertingPolicy alertingPolicies = 2;
}

// UpdateAlertingPolicyRequest 表示更新告警策略请求
message UpdateAlertingPolicyRequest {
  // id 表示要更新的告警策略 ID
  // @gotags: uri:"id"
  int64 id = 1;

  // name 表示策略名称
  optional string name = 2;
  // description 表示策略描述
  optional string description = 3;
  // configJSON 表示策略配置 JSON
  optional string configJSON = 4;
  // expectedVersion 表示期望的版本号（用于乐观锁）
  optional int32 expectedVersion = 5;
}

// UpdateAlertingPolicyResponse 表示更新告警策略响应
message UpdateAlertingPolicyResponse {
  // alertingPolicy 表示更新后的告警策略信息
  AlertingPolicy alertingPolicy = 1;
}

// DeleteAlertingPolicyRequest 表示删除告警策略请求
message DeleteAlertingPolicyRequest {
  // id 表示要删除的告警策略 ID
  // @gotags: uri:"id"
  int64 id = 1;
}

// DeleteAlertingPolicyResponse 表示删除告警策略响应
message DeleteAlertingPolicyResponse {}

// ActivateAlertingPolicyRequest 表示激活告警策略请求
message ActivateAlertingPolicyRequest {
  // id 表示要激活的告警策略 ID
  // @gotags: uri:"id"
  int64 id = 1;

  // operator 表示操作者（可选，默认从上下文获取）
  optional string operator = 2;
}

// ActivateAlertingPolicyResponse 表示激活告警策略响应
message ActivateAlertingPolicyResponse {}

// DeactivateAlertingPolicyRequest 表示停用告警策略请求
message DeactivateAlertingPolicyRequest {
  // id 表示要停用的告警策略 ID
  // @gotags: uri:"id"
  int64 id = 1;
}

// DeactivateAlertingPolicyResponse 表示停用告警策略响应
message DeactivateAlertingPolicyResponse {}

// RollbackAlertingPolicyRequest 表示回滚告警策略请求
message RollbackAlertingPolicyRequest {
  // id 表示要回滚的告警策略 ID
  // @gotags: uri:"id"
  int64 id = 1;

  // version 表示要回滚到的版本号（必填）
  int32 version = 2;
  // operator 表示操作者（可选，默认从上下文获取）
  optional string operator = 3;
}

// RollbackAlertingPolicyResponse 表示回滚告警策略响应
message RollbackAlertingPolicyResponse {}

// GetActiveAlertingPolicyRequest 表示获取当前激活的告警策略请求
message GetActiveAlertingPolicyRequest {}

// GetActiveAlertingPolicyResponse 表示获取当前激活的告警策略响应
message GetActiveAlertingPolicyResponse {
  // alertingPolicy 表示当前激活的告警策略
  AlertingPolicy alertingPolicy = 1;
}