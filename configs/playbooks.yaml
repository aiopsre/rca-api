version: t6
rules:
  - id: root-missing-evidence
    match:
      root_cause_types: ["missing_evidence"]
    items:
      - id: pb-missing-evidence-collect
        title: Collect missing evidence before conclusion
        risk: LOW
        rationale: Current diagnosis indicates missing signals. Collecting key evidence reduces false conclusions.
        steps:
          - type: check
            text: Confirm logs and traces are queryable for the incident time window.
          - type: check
            text: Re-run metrics/log queries with aligned start and end timestamps.
        verification:
          recommended_steps: [0]
          expected_outcome: Verification checks should return non-empty aligned evidence after data gaps are fixed.

  - id: root-conflict-evidence
    match:
      root_cause_types: ["conflict_evidence"]
    items:
      - id: pb-conflict-evidence-align
        title: Align evidence windows and escalate for human review
        risk: MEDIUM
        rationale: Conflicting signals require careful human validation before any mitigation decision.
        steps:
          - type: check
            text: Align metrics, logs, and traces to the same interval and compare anomalies.
          - type: action
            text: Ask the on-call engineer to confirm findings before applying any mitigation.
            requires_human: true
        verification:
          recommended_steps: [0]
          expected_outcome: Re-check result should consistently support one signal direction after alignment.

  - id: root-unknown
    match:
      root_cause_types: ["unknown"]
    items:
      - id: pb-unknown-triage
        title: Run baseline triage checks
        risk: LOW
        rationale: Unknown root cause should start from deterministic low-risk diagnostics.
        steps:
          - type: check
            text: Compare recent deployments or config changes with incident start time.
          - type: check
            text: Inspect top error signals and hot endpoints for the same period.
        verification:
          recommended_steps: [0]
          expected_outcome: Verification checks should reproduce the dominant failure signal used by diagnosis.

  - id: pattern-latency-or-5xx
    match:
      patterns_contains: ["latency", "5xx", "timeout", "error_rate"]
    items:
      - id: pb-pattern-latency
        title: Validate latency and error spike scope
        risk: LOW
        rationale: Pattern matches indicate request path saturation or partial dependency instability.
        steps:
          - type: check
            text: Break down latency and 5xx by route/workload to identify the hottest subset.
          - type: check
            text: Verify upstream dependency health around the same timestamps.
        verification:
          recommended_steps: [0]
          expected_outcome: Verification should confirm whether latency and error spikes stay concentrated on one subset.

fallback:
  items:
    - id: pb-fallback-baseline
      title: Apply generic low-risk RCA checks
      risk: LOW
      rationale: No specific playbook rule matched; apply deterministic baseline checks.
      steps:
        - type: check
          text: Review recent change history and dependency status for the incident service.
        - type: check
          text: Re-run the primary verification query to confirm issue reproducibility.
      verification:
        recommended_steps: [0]
        expected_outcome: Verification should reproduce the same key signal before any mitigation decision.
